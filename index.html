<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Amon Studio</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f0;color:#1a1a1a;}
    #auth-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;}
    .auth-card{background:#fff;border:0.5px solid #e0e0d8;border-radius:16px;padding:40px;width:360px;text-align:center;}
    .auth-logo{font-size:20px;font-weight:500;margin-bottom:8px;}
    .auth-sub{font-size:13px;color:#888;margin-bottom:32px;}
    .btn-tiktok{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;padding:12px;background:#000;color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:500;cursor:pointer;}
    .btn-tiktok:hover{opacity:0.85;}
    .auth-note{font-size:11px;color:#aaa;margin-top:16px;}
    #dashboard{display:none;min-height:100vh;}
    .shell{display:flex;height:100vh;}
    .sidebar{width:220px;min-width:220px;background:#fff;border-right:0.5px solid #e0e0d8;display:flex;flex-direction:column;}
    .sidebar-logo{padding:20px;border-bottom:0.5px solid #e0e0d8;}
    .logo-name{font-size:15px;font-weight:500;}
    .logo-sub{font-size:11px;color:#999;margin-top:2px;}
    .nav{padding:12px 10px;flex:1;overflow-y:auto;}
    .nav-section{font-size:10px;color:#bbb;padding:10px 10px 4px;text-transform:uppercase;letter-spacing:0.5px;}
    .nav-item{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:8px;cursor:pointer;font-size:13px;color:#666;margin-bottom:2px;}
    .nav-item:hover{background:#f5f5f0;color:#1a1a1a;}
    .nav-item.active{background:#f5f5f0;color:#1a1a1a;font-weight:500;}
    .nav-sub{padding-left:24px;}
    .nav-sub .nav-item{font-size:12px;padding:6px 10px;}
    .sidebar-footer{padding:16px 20px;border-top:0.5px solid #e0e0d8;}
    .btn-logout{font-size:12px;color:#999;cursor:pointer;background:none;border:none;}
    .main{flex:1;overflow-y:auto;}
    .topbar{background:#fff;border-bottom:0.5px solid #e0e0d8;padding:14px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10;}
    .topbar-left{display:flex;align-items:center;gap:12px;}
    .topbar-title{font-size:15px;font-weight:500;}
    .breadcrumb{font-size:13px;color:#999;}
    .topbar-right{display:flex;align-items:center;gap:10px;}
    .badge-sandbox{font-size:11px;background:#fef9e7;color:#b7791f;padding:3px 8px;border-radius:6px;}
    .last-refresh{font-size:11px;color:#999;}
    .btn-add{font-size:12px;background:#1a1a1a;color:#fff;border:none;padding:7px 14px;border-radius:8px;cursor:pointer;}
    .content{padding:24px;}
    .section-label{font-size:12px;color:#999;font-weight:500;margin-bottom:12px;}
    .metrics-row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:28px;}
    .metric-card{background:#f5f5f0;border-radius:8px;padding:14px 16px;}
    .metric-label{font-size:11px;color:#999;margin-bottom:6px;}
    .metric-value{font-size:22px;font-weight:500;}
    .metric-delta{font-size:11px;color:#666;margin-top:4px;}
    .app-tabs{display:flex;gap:6px;margin-bottom:20px;}
    .app-tab{font-size:12px;padding:6px 16px;border-radius:20px;border:0.5px solid #e0e0d8;background:transparent;color:#666;cursor:pointer;font-weight:500;}
    .app-tab:hover{background:#f5f5f0;}
    .app-tab.active{background:#1a1a1a;color:#fff;border-color:transparent;}
    .app-summary{background:#fff;border:0.5px solid #e0e0d8;border-radius:14px;padding:16px;margin-bottom:16px;}
    .app-summary-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
    .app-summary-name{font-size:14px;font-weight:500;}
    .app-summary-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
    .accounts-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;margin-bottom:28px;}
    .account-card{background:#fff;border:0.5px solid #e0e0d8;border-radius:14px;padding:16px;}
    .account-header{display:flex;align-items:center;gap:10px;margin-bottom:14px;}
    .avatar{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:500;flex-shrink:0;}
    .avatar-i{background:#eeedfe;color:#3c3489;}
    .avatar-f{background:#e1f5ee;color:#085041;}
    .account-name{font-size:14px;font-weight:500;}
    .account-handle{font-size:11px;color:#999;margin-top:1px;}
    .account-tag{font-size:10px;padding:2px 8px;border-radius:20px;margin-left:auto;}
    .tag-official{background:#e6f1fb;color:#185fa5;}
    .tag-organic{background:#eaf3de;color:#3b6d11;}
    .stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
    .stat-box{background:#f5f5f0;border-radius:8px;padding:8px 4px;text-align:center;}
    .stat-val{font-size:15px;font-weight:500;}
    .stat-lbl{font-size:10px;color:#999;margin-top:2px;}
    .videos-card{background:#fff;border:0.5px solid #e0e0d8;border-radius:14px;padding:16px;}
    .videos-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
    .videos-title{font-size:13px;font-weight:500;}
    .filter-row{display:flex;gap:6px;}
    .filter-btn{font-size:11px;padding:4px 10px;border-radius:20px;border:0.5px solid #e0e0d8;background:transparent;color:#666;cursor:pointer;}
    .filter-btn.active{background:#1a1a1a;color:#fff;border-color:transparent;}
    .video-row{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:0.5px solid #f0f0e8;}
    .video-row:last-child{border-bottom:none;}
    .video-thumb{width:40px;height:40px;border-radius:6px;background:#f5f5f0;flex-shrink:0;display:flex;align-items:center;justify-content:center;overflow:hidden;}
    .video-thumb img{width:100%;height:100%;object-fit:cover;}
    .video-info{flex:1;min-width:0;}
    .video-title-text{font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .video-meta-text{font-size:11px;color:#999;margin-top:2px;}
    .video-stats-col{display:flex;gap:14px;flex-shrink:0;}
    .vstat{font-size:11px;color:#999;text-align:right;}
    .vstat span{display:block;font-size:13px;font-weight:500;color:#1a1a1a;}
    .empty-state{text-align:center;padding:32px;color:#bbb;font-size:13px;}
    .channel-badge{font-size:10px;padding:2px 7px;border-radius:20px;background:#f0f0e8;color:#666;}
    .coming-soon{opacity:0.4;pointer-events:none;}
  </style>
</head>
<body>

<script>
(function(){
  var p=new URLSearchParams(window.location.search);
  var code=p.get('code'),state=p.get('state');
  if(code){sessionStorage.setItem('tk_code',code);sessionStorage.setItem('tk_state',state||'');window.history.replaceState({},document.title,window.location.pathname);}
})();
</script>

<div id="auth-screen">
  <div class="auth-card">
    <div class="auth-logo">Amon Studio</div>
    <div class="auth-sub">Dashboard organique TikTok</div>
    <button class="btn-tiktok" onclick="loginWithTikTok()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="white"><path d="M19.59 6.69a4.83 4.83 0 01-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 01-2.88 2.5 2.89 2.89 0 01-2.89-2.89 2.89 2.89 0 012.89-2.89c.28 0 .54.04.79.1V9.01a6.33 6.33 0 00-.79-.05 6.34 6.34 0 00-6.34 6.34 6.34 6.34 0 006.34 6.34 6.34 6.34 0 006.33-6.34V8.69a8.18 8.18 0 004.78 1.52V6.76a4.85 4.85 0 01-1.01-.07z"/></svg>
      Connecter avec TikTok
    </button>
    <div class="auth-note">Mode Sandbox — accès limité à tes comptes test</div>
  </div>
</div>

<div id="dashboard">
  <div class="shell">
    <div class="sidebar">
      <div class="sidebar-logo">
        <div class="logo-name">Amon Studio</div>
        <div class="logo-sub">Organic dashboard</div>
      </div>
      <div class="nav">
        <div class="nav-section">Channels</div>
        <div class="nav-item active" id="nav-tiktok" onclick="setView('tiktok-all')">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M19.59 6.69a4.83 4.83 0 01-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 01-2.88 2.5 2.89 2.89 0 01-2.89-2.89 2.89 2.89 0 012.89-2.89c.28 0 .54.04.79.1V9.01a6.33 6.33 0 00-.79-.05 6.34 6.34 0 00-6.34 6.34 6.34 6.34 0 006.34 6.34 6.34 6.34 0 006.33-6.34V8.69a8.18 8.18 0 004.78 1.52V6.76a4.85 4.85 0 01-1.01-.07z"/></svg>
          TikTok
        </div>
        <div class="nav-sub">
          <div class="nav-item" id="nav-iris" onclick="setView('iris')">— Iris</div>
          <div class="nav-item" id="nav-frank" onclick="setView('frank')">— Frank</div>
        </div>
        <div class="nav-item coming-soon">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="2" width="20" height="20" rx="5"/><path d="M16 11.37A4 4 0 1112.63 8 4 4 0 0116 11.37zM17.5 6.5h.01"/></svg>
          Instagram
          <span style="font-size:9px;color:#ccc;margin-left:auto;">bientôt</span>
        </div>
        <div class="nav-section">Planning</div>
        <div class="nav-item coming-soon">
          <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.2"><rect x="1" y="3" width="14" height="12" rx="1"/><path d="M5 1v4M11 1v4M1 7h14"/></svg>
          Calendrier
        </div>
        <div class="nav-item coming-soon">
          <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.2"><circle cx="8" cy="8" r="6.5"/><path d="M8 5v3.5l2.5 1.5" stroke-linecap="round"/></svg>
          File de posts
        </div>
      </div>
      <div class="sidebar-footer">
        <button class="btn-logout" onclick="logout()">Se déconnecter</button>
      </div>
    </div>

    <div class="main">
      <div class="topbar">
        <div class="topbar-left">
          <div class="topbar-title" id="topbar-title">TikTok — Tous les comptes</div>
        </div>
        <div class="topbar-right">
          <span class="last-refresh" id="last-refresh"></span>
          <span class="badge-sandbox">Sandbox</span>
          <button class="btn-add" onclick="addAccount()">+ Ajouter un compte</button>
        </div>
      </div>
      <div class="content" id="main-content">
        <div class="empty-state">Chargement...</div>
      </div>
    </div>
  </div>
</div>

<script>
var CK='sbawab524mqpdbsqqc';
var RU='https://amon-studio.github.io/amon-studio/';
var SC='user.info.basic,user.info.stats,user.info.profile,video.list';
var SB='https://qrqjcpqulqqzddnjtnxj.supabase.co/functions/v1/tiktok-token';
var accounts=[];
var videos=[];
var currentView='tiktok-all';

function loginWithTikTok(){
  var st=Math.random().toString(36).substring(2);
  sessionStorage.setItem('tk_st',st);
  location.href='https://www.tiktok.com/v2/auth/authorize/?client_key='+CK+'&scope='+SC+'&response_type=code&redirect_uri='+encodeURIComponent(RU)+'&state='+st;
}
async function getToken(code){
  try{var r=await fetch(SB,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({code:code})});return await r.json();}catch(e){return null;}
}
async function getUser(token){
  try{var r=await fetch('https://open.tiktokapis.com/v2/user/info/?fields=open_id,display_name,avatar_url,follower_count,following_count,likes_count,video_count',{headers:{'Authorization':'Bearer '+token}});var d=await r.json();return d.data&&d.data.user?d.data.user:null;}catch(e){return null;}
}
async function getVideos(token){
  try{var r=await fetch('https://open.tiktokapis.com/v2/video/list/?fields=id,title,cover_image_url,like_count,view_count,comment_count,create_time',{method:'POST',headers:{'Authorization':'Bearer '+token,'Content-Type':'application/json'},body:JSON.stringify({max_count:10})});var d=await r.json();return d.data&&d.data.videos?d.data.videos:[];}catch(e){return[];}
}
function fmt(n){if(!n&&n!==0)return'—';if(n>=1000000)return(n/1000000).toFixed(1)+'M';if(n>=1000)return(n/1000).toFixed(1)+'K';return''+n;}
function appType(name){name=(name||'').toLowerCase();return(name.includes('iris')||name.includes('social signals'))?'iris':'frank';}
function isOfficialAccount(name){name=(name||'').toLowerCase();return name.includes('social signals')||name.includes('coachapp')||name.includes('official')||name.includes('officiel');}
function dedupe(arr){var seen={};return arr.filter(function(a){if(!a.open_id||seen[a.open_id])return false;seen[a.open_id]=true;return true;});}
function load(){return dedupe(JSON.parse(localStorage.getItem('am_accounts')||'[]'));}
function save(arr){localStorage.setItem('am_accounts',JSON.stringify(dedupe(arr)));}

function setView(view){
  currentView=view;
  document.querySelectorAll('.nav-item').forEach(function(el){el.classList.remove('active');});
  if(view==='tiktok-all')document.getElementById('nav-tiktok').classList.add('active');
  else if(view==='iris')document.getElementById('nav-iris').classList.add('active');
  else if(view==='frank')document.getElementById('nav-frank').classList.add('active');
  renderView();
}

function renderView(){
  var content=document.getElementById('main-content');
  var title=document.getElementById('topbar-title');

  if(currentView==='tiktok-all'){
    title.textContent='TikTok — Tous les comptes';
    renderAllAccounts(content);
  } else if(currentView==='iris'){
    title.textContent='TikTok — Iris';
    renderAppView(content,'iris');
  } else if(currentView==='frank'){
    title.textContent='TikTok — Frank';
    renderAppView(content,'frank');
  }
}

function metricCards(tf,tl,tv,nc){
  return '<div class="metrics-row">'
    +'<div class="metric-card"><div class="metric-label">Followers total</div><div class="metric-value">'+fmt(tf)+'</div><div class="metric-delta">'+nc+' compte'+(nc>1?'s':'')+'</div></div>'
    +'<div class="metric-card"><div class="metric-label">Likes total</div><div class="metric-value">'+fmt(tl)+'</div><div class="metric-delta">Tous comptes</div></div>'
    +'<div class="metric-card"><div class="metric-label">Vidéos publiées</div><div class="metric-value">'+fmt(tv)+'</div><div class="metric-delta">Tous comptes</div></div>'
    +'<div class="metric-card"><div class="metric-label">Comptes actifs</div><div class="metric-value">'+nc+'</div><div class="metric-delta">Connectés</div></div>'
    +'</div>';
}

function accountCard(a){
  var isI=appType(a.display_name)==='iris';
  var isOf=isOfficialAccount(a.display_name);
  var av=isI?'avatar-i':'avatar-f';
  var ini=isI?'I':'F';
  var tagC=isOf?'tag-official':'tag-organic';
  var tagL=isOf?'Officiel':'Organique';
  return '<div class="account-card">'
    +'<div class="account-header"><div class="avatar '+av+'">'+ini+'</div>'
    +'<div><div class="account-name">'+(a.display_name||'Compte')+'</div><div class="account-handle">@'+(a.display_name||'—')+'</div></div>'
    +'<span class="account-tag '+tagC+'">'+tagL+'</span></div>'
    +'<div class="stats-row">'
    +'<div class="stat-box"><div class="stat-val">'+fmt(a.follower_count)+'</div><div class="stat-lbl">Followers</div></div>'
    +'<div class="stat-box"><div class="stat-val">'+fmt(a.likes_count)+'</div><div class="stat-lbl">Likes</div></div>'
    +'<div class="stat-box"><div class="stat-val">'+fmt(a.video_count)+'</div><div class="stat-lbl">Vidéos</div></div>'
    +'</div></div>';
}

function videosSection(vids, showFilter){
  var filterHtml=showFilter?'<div class="filter-row"><button class="filter-btn active" onclick="filterVideos(\'all\',this)">Tous</button><button class="filter-btn" onclick="filterVideos(\'iris\',this)">Iris</button><button class="filter-btn" onclick="filterVideos(\'frank\',this)">Frank</button></div>':'';
  var html='<div class="videos-card"><div class="videos-header"><div class="videos-title">Dernières vidéos</div>'+filterHtml+'</div><div id="videos-list">';
  if(!vids||!vids.length){html+='<div class="empty-state">Aucune vidéo</div>';}
  else{
    var n=Math.min(vids.length,10);
    for(var i=0;i<n;i++){
      var v=vids[i],dt=v.create_time?new Date(v.create_time*1000).toLocaleDateString('fr-FR'):'';
      html+='<div class="video-row"><div class="video-thumb">'+(v.cover_image_url?'<img src="'+v.cover_image_url+'" alt=""/>':'<svg width="14" height="14" viewBox="0 0 16 16" fill="#ccc"><path d="M5 3l8 5-8 5V3z"/></svg>')+'</div>';
      html+='<div class="video-info"><div class="video-title-text">'+(v.title||'Sans titre')+'</div><div class="video-meta-text">'+dt+'</div></div>';
      html+='<div class="video-stats-col"><div class="vstat"><span>'+fmt(v.view_count)+'</span>vues</div><div class="vstat"><span>'+fmt(v.like_count)+'</span>likes</div></div></div>';
    }
  }
  return html+'</div></div>';
}

function renderAllAccounts(content){
  var unique=dedupe(accounts);
  if(!unique.length){content.innerHTML='<div class="empty-state">Aucun compte connecté</div>';return;}
  var tf=0,tl=0,tv=0;
  for(var i=0;i<unique.length;i++){tf+=unique[i].follower_count||0;tl+=unique[i].likes_count||0;tv+=unique[i].video_count||0;}
  var html='<div class="section-label">Métriques globales — TikTok</div>';
  html+=metricCards(tf,tl,tv,unique.length);
  html+='<div class="section-label">Comptes TikTok</div><div class="accounts-grid">';
  for(var i=0;i<unique.length;i++) html+=accountCard(unique[i]);
  html+='</div>';
  html+=videosSection(videos, true);
  content.innerHTML=html;
}

function renderAppView(content, app){
  var appName=app==='iris'?'Iris':'Frank';
  var filtered=accounts.filter(function(a){return appType(a.display_name)===app;});
  if(!filtered.length){content.innerHTML='<div class="empty-state">Aucun compte '+appName+' connecté</div>';return;}
  var tf=0,tl=0,tv=0;
  for(var i=0;i<filtered.length;i++){tf+=filtered[i].follower_count||0;tl+=filtered[i].likes_count||0;tv+=filtered[i].video_count||0;}
  var html='<div class="section-label">Métriques globales — '+appName+'</div>';
  html+=metricCards(tf,tl,tv,filtered.length);
  html+='<div class="section-label">Comptes '+appName+'</div><div class="accounts-grid">';
  for(var i=0;i<filtered.length;i++) html+=accountCard(filtered[i]);
  html+='</div>';
  var appVids=videos.filter(function(v){return v._account===app;});
  html+=videosSection(appVids, false);
  content.innerHTML=html;
}

function filterVideos(f,btn){
  document.querySelectorAll('.filter-btn').forEach(function(b){b.classList.remove('active');});
  btn.classList.add('active');
  var vids=f==='all'?videos:videos.filter(function(v){return v._account===f;});
  var list=document.getElementById('videos-list');
  if(!list)return;
  if(!vids.length){list.innerHTML='<div class="empty-state">Aucune vidéo</div>';return;}
  var html='',n=Math.min(vids.length,10);
  for(var i=0;i<n;i++){
    var v=vids[i],dt=v.create_time?new Date(v.create_time*1000).toLocaleDateString('fr-FR'):'';
    html+='<div class="video-row"><div class="video-thumb">'+(v.cover_image_url?'<img src="'+v.cover_image_url+'" alt=""/>':'<svg width="14" height="14" viewBox="0 0 16 16" fill="#ccc"><path d="M5 3l8 5-8 5V3z"/></svg>')+'</div>';
    html+='<div class="video-info"><div class="video-title-text">'+(v.title||'Sans titre')+'</div><div class="video-meta-text">'+dt+'</div></div>';
    html+='<div class="video-stats-col"><div class="vstat"><span>'+fmt(v.view_count)+'</span>vues</div><div class="vstat"><span>'+fmt(v.like_count)+'</span>likes</div></div></div>';
  }
  list.innerHTML=html;
}

function showDashboard(){document.getElementById('auth-screen').style.display='none';document.getElementById('dashboard').style.display='block';}
function logout(){localStorage.clear();sessionStorage.clear();location.reload();}
function addAccount(){loginWithTikTok();}
function updateTime(){var el=document.getElementById('last-refresh');if(el)el.textContent='Mis à jour à '+new Date().toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'});}

async function refresh(){
  var saved=load();
  if(!saved.length)return;
  var updated=[],fresh=[];
  for(var i=0;i<saved.length;i++){
    var a=saved[i];
    if(!a.token){updated.push(a);continue;}
    var u=await getUser(a.token),v=await getVideos(a.token);
    if(u){var ad=Object.assign({},a,u,{videos:v});updated.push(ad);var t=appType(u.display_name);for(var j=0;j<v.length;j++)v[j]._account=t;fresh=fresh.concat(v);}
    else updated.push(a);
  }
  save(updated);accounts=updated;videos=fresh;
  renderView();updateTime();
}

async function handleCallback(code){
  var saved=load();accounts=saved;videos=[];
  for(var i=0;i<saved.length;i++){var a=saved[i],t=appType(a.display_name),v=a.videos||[];for(var j=0;j<v.length;j++)v[j]._account=t;videos=videos.concat(v);}
  showDashboard();
  document.getElementById('main-content').innerHTML='<div class="empty-state">Connexion en cours...</div>';
  var td=await getToken(code);
  if(!td||td.error){renderView();return;}
  var u=await getUser(td.access_token),vids=await getVideos(td.access_token);
  if(u){
    var exists=false;for(var i=0;i<accounts.length;i++){if(accounts[i].open_id===u.open_id){exists=true;break;}}
    if(!exists){var ad=Object.assign({},u,{token:td.access_token,videos:vids});accounts.push(ad);saved.push(ad);save(saved);}
    var t=appType(u.display_name);for(var i=0;i<vids.length;i++)vids[i]._account=t;videos=videos.concat(vids);
  }
  renderView();updateTime();
  window.history.replaceState({},document.title,RU);
  setInterval(refresh,30*60*1000);
}

async function init(){
  var code=sessionStorage.getItem('tk_code');
  if(code){sessionStorage.removeItem('tk_code');sessionStorage.removeItem('tk_state');await handleCallback(code);return;}
  var saved=load();
  if(saved.length){
    showDashboard();accounts=saved;videos=[];
    for(var i=0;i<saved.length;i++){var a=saved[i],t=appType(a.display_name),v=a.videos||[];for(var j=0;j<v.length;j++)v[j]._account=t;videos=videos.concat(v);}
    renderView();refresh();setInterval(refresh,30*60*1000);
  }
}

init();
</script>
